<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor IA</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #e9ecef; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
        }
        .tarjeta { 
            background: white; 
            padding: 40px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center;
        }
        h1 { color: #2c3e50; }
        p { color: #7f8c8d; font-size: 18px; }
        .boton { 
            display: inline-block;
            margin-top: 20px;
            background: #2980b9; 
            color: white; 
            padding: 12px 24px; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold;
        }
        .boton:hover { background: #3498db; }
    </style>
</head>
<body>
    <div class="tarjeta">
        <h1>⚙️ Panel de Control IA</h1>
        <p>Bienvenido al Gestor de Tareas Inteligente.</p>
        <p>El motor de Árboles de Decisión está en línea.</p>
        <a href="/tareas" class="boton">Ver Tareas Pendientes</a>
    </div>
</body>
</html>
