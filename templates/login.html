<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso - Taskserv</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .contenedor-login { background: #ecf0f1; color: #333; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #2980b9; margin-bottom: 5px; }
        p { color: #7f8c8d; margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #bdc3c7; border-radius: 5px; }
        button { width: 95%; padding: 10px; margin-top: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-entrar { background-color: #27ae60; }
        .btn-registrar { background-color: #2980b9; }
        hr { border: 1px solid #bdc3c7; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="contenedor-login">
        <h1>Taskserv ⚙️</h1>
        <p>Inicia sesión para ver tus tareas</p>

        <!-- Formulario para ENTRAR -->
        <form action="/login" method="POST">
            <input type="text" name="nombre_usuario" placeholder="Tu Usuario" required>
            <input type="password" name="password" placeholder="Tu Contraseña" required>
            <button type="submit" class="btn-entrar">Entrar</button>
        </form>

        <hr>
        <p style="font-size: 14px; margin-bottom: 5px;">¿No tienes cuenta?</p>
        
        <!-- Formulario para REGISTRARSE -->
        <form action="/registro" method="POST">
            <input type="text" name="nombre_usuario" placeholder="Inventa un Usuario" required>
            <input type="password" name="password" placeholder="Inventa una Contraseña" required>
            <button type="submit" class="btn-registrar">Crear Cuenta Nueva</button>
        </form>
    </div>
</body>
</html>
